syntax = "proto3";
package stratus.v1;

message ApplyRequest {
  repeated string resources = 1;  // JSON-encoded Resource objects
}

message ApplyResult {
  string kind = 1;
  string name = 2;
  string action = 3;  // "created" or "updated"
  uint64 revision = 4;
}

message ApplyResponse {
  repeated ApplyResult results = 1;
}

message GetRequest {
  string kind = 1;
  optional string name = 2;
}

message GetResponse {
  repeated string resources = 1;  // JSON-encoded Resource objects
  uint64 revision = 2;
  map<string, string> instance_statuses = 3;
}

message DeleteRequest {
  string kind = 1;
  string name = 2;
}

message DeleteResponse {
  bool found = 1;
  uint64 revision = 2;
}

message InstanceActionRequest {
  string name = 1;
}

message InstanceActionResponse {
  string name = 1;
  string status = 2;
  string message = 3;
}

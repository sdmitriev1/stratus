name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler musl-tools

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/stratus dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/stratusd dist/ 2>/dev/null || true
          cp systemd/stratusd.service dist/
          tar czf stratus-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: stratus-*.tar.gz
